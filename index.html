<!DOCTYPE html>
<html>
<head>
    <title>SirenAI</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #333; margin: 20px; padding: 10px; border-radius: 10px; }
        input { padding: 10px; width: 70%; border-radius: 5px; border: none; }
        button { padding: 10px; background: #0b57d0; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Gemini Public Bot</h1>
    <div id="chat"></div>
    <input type="text" id="msg" placeholder="Message likho...">
    <button onclick="send()">Send</button>

    <script>
        async function send() {
            const input = document.getElementById('msg');
            const chat = document.getElementById('chat');
            const userMsg = input.value;
            
            chat.innerHTML += `<div><b>You:</b> ${userMsg}</div>`;
            input.value = '';

            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: userMsg })
            });
            const data = await res.json();
            chat.innerHTML += `<div><b>AI:</b> ${data.text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
